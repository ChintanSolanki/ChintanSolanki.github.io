<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title><span id="nameTitle"></span> - Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="data.js"></script>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#projects">Projects</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section id="home" class="hero">
        <div class="container">
            <img src="" alt="" class="profile-pic" id="profilePicture">
            <h1 id="nameHeading"></h1>
            <p class="intro" id="shortBio"></p>
            <div class="social-links">
                <a href="#" target="_blank" id="linkedinLink"><i class="fab fa-linkedin"></i></a>
                <a href="#" target="_blank" id="trailheadLink"><i class="fa-brands fa-salesforce"></i></a> </div>
        </div>
    </section>

    <section id="about" class="about">
        <div class="container">
            <h2 id="aboutTitle">About Me</h2>
            <p id="aboutMe"></p>

            <h3>Skills</h3>
            <ul class="skills-list" id="skillsList">
                </ul>

            <h3>Experience</h3>
            <p id="experience"></p>
            </div>
    </section>

    <section id="projects" class="projects">
        <div class="container">
            <h2 id="projectsTitle">Projects</h2>
            <div class="project-grid" id="projectGrid">
                </div>
        </div>
    </section>

    <section id="contact" class="contact">
        <div class="container">
            <h2 id="contactTitle">Contact Me</h2>
            <p>Feel free to reach out!</p>
            <div class="contact-options">
                <p><i class="fas fa-envelope"></i> <a href="#" id="emailLink"></a></p>
                <p><i class="fab fa-linkedin"></i> <a href="#" target="_blank" id="linkedinLinkContact">LinkedIn</a></p>
                <p><i class="fa-brands fa-salesforce"></i> <a href="#" target="_blank" id="trailheadLinkContact">Trailhead</a></p>
                </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; <span id="copyrightYear"></span> <span id="nameFooter"></span>. All rights reserved.</p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
